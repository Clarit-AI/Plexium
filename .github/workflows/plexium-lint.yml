name: Plexium Lint

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  wiki-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Plexium
        run: go build -o plexium ./cmd/plexium

      - name: Initialize wiki for lint
        run: ./plexium init

      - name: Deterministic lint
        id: deterministic_lint
        run: |
          mkdir -p .plexium/reports
          set +e
          ./plexium lint --deterministic --ci --fail-on error 2>&1 | tee .plexium/reports/deterministic-lint.txt
          status=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: CI diff check
        id: ci_diff_check
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p .plexium/reports
          set +e
          ./plexium ci check \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --output .plexium/reports/ci-check.json \
            2>&1 | tee .plexium/reports/ci-check.log
          status=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Build PR summary
        if: always() && github.event_name == 'pull_request'
        env:
          DETERMINISTIC_LINT_EXIT_CODE: ${{ steps.deterministic_lint.outputs.exit_code }}
          CI_DIFF_CHECK_EXIT_CODE: ${{ steps.ci_diff_check.outputs.exit_code }}
        run: |
          summary_file=.plexium/reports/ci-check-summary.md
          if [ -f .plexium/reports/ci-check.json ] && jq -e . .plexium/reports/ci-check.json >/dev/null 2>&1; then
            {
              echo "## Plexium Wiki Check"
              echo
              jq -r '
                "- **Changed files:** \((.changedFiles // []) | length) (\((.sourceFiles // []) | length) source)",
                "- **Wiki updated:** \(if .wikiUpdated then "Yes" else "No" end)",
                "- **Wiki debt:** \(.debtCount) entries",
                "- **Result:** \(if .passes then "✅ Passes" else "❌ Fails" end)"
              ' .plexium/reports/ci-check.json
              if [ -n "${CI_DIFF_CHECK_EXIT_CODE:-}" ] && [ "$CI_DIFF_CHECK_EXIT_CODE" != "0" ]; then
                echo "- **CI check exit code:** $CI_DIFF_CHECK_EXIT_CODE"
              fi
              if [ -n "${DETERMINISTIC_LINT_EXIT_CODE:-}" ] && [ "$DETERMINISTIC_LINT_EXIT_CODE" != "0" ]; then
                echo "- **Deterministic lint:** emitted findings on the freshly initialized wiki; see workflow logs."
              fi
            } > "$summary_file"
          else
            details="Could not read report file."
            if [ -f .plexium/reports/ci-check.log ]; then
              log_size=$(wc -c < .plexium/reports/ci-check.log | tr -d '[:space:]')
              details=$(head -c 50000 .plexium/reports/ci-check.log)
              if [ "${log_size:-0}" -gt 50000 ]; then
                details="${details}"$'\n[...truncated]'
              fi
            fi
            {
              echo "## Plexium Wiki Check"
              echo
              echo "⚠️ Could not read report file."
              echo
              echo '```'
              printf '%s\n' "$details"
              echo '```'
            } > "$summary_file"
          fi

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '## Plexium Wiki Check\n\n⚠️ Could not read summary file.\n';
            try {
              report = fs.readFileSync('.plexium/reports/ci-check-summary.md', 'utf8');
            } catch (e) {}
            const truncationNotice = '\n\n[...truncated]';
            const maxCommentLength = 60000;
            if (report.length > maxCommentLength) {
              report = report.slice(0, maxCommentLength - truncationNotice.length) + truncationNotice;
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
