name: Plexium Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Plexium
        run: go build ./cmd/plexium

      - name: Sync wiki
        run: ./plexium sync --ci

      - name: Publish to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./plexium gh-wiki-sync --push

      - name: Emit sync report
        run: |
          ./plexium report --format markdown >> "$GITHUB_STEP_SUMMARY"
