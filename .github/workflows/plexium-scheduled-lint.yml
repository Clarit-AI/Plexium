name: Plexium Scheduled Lint

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Plexium
        run: go build ./cmd/plexium

      - name: Run full lint
        run: |
          mkdir -p .plexium/reports
          ./plexium lint --deterministic --ci --output .plexium/reports/weekly-lint.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: plexium-weekly-lint
          path: .plexium/reports/weekly-lint.json
          retention-days: 30
